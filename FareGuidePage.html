                <option value="0">Recto</option>
            </select>
            <br>

            <br>
            <div class="row">
            <label>DROPOFF LOCATION:</label>
                <select class="form-select" id="dropoff">
                <option selected>Choose location</option>
                <option value="10">Santolan</option>
                <option value="9">Katipunan</option>
                <option value="8">Anonas</option>

            <div class="col">
                <div class="btn btn-secondary" onclick="calculateFare()">Regular Fare</div>

            </div>

<script>

let basefare = 50;
let baseKM = 2;
let perKMrate = 10;

function calculateFare() {

  let pickupKM = parseFloat(document.getElementById("pickup").value);
  let dropoffKM = parseFloat(document.getElementById("dropoff").value);

  let distance = Math.abs(dropoffKM - pickupKM);

  if(distance == 0){
    document.getElementById("result").innerHTML =
    "Please select different locations.";
    return;
  }

  let fare;

  if(distance <= baseKM){
    fare = basefare;
  }
  else{
    fare = basefare + ((distance - baseKM) * perKMrate);
  }

  document.getElementById("result").innerHTML =
  "Distance: " + distance + " km <br>Fare: ₱" + fare;

}


function calculateDiscountFare() {

  let pickupKM = parseFloat(document.getElementById("pickup").value);
  let dropoffKM = parseFloat(document.getElementById("dropoff").value);

  let distance = Math.abs(dropoffKM - pickupKM);

  if(distance == 0){
    document.getElementById("result").innerHTML =
    "Please select different locations.";
    return;
  }

  let fare;

  if(distance <= baseKM){
    fare = basefare;
  }
  else{
    fare = basefare + ((distance - baseKM) * perKMrate);
  }

  fare = fare - (fare * 0.20)

  document.getElementById("result").innerHTML =
  "Distance: " + distance + " km<br>" +
  "Discounted Fare (20% off): ₱" + fare.toFixed(2);

}

</script>
