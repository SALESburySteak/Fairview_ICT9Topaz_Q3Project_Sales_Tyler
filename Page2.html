<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://i.pinimg.com/originals/5f/15/09/5f15098f225d5ba6a127121fb3fd3d0c.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            min-height: 100vh;
        }
        .registration-card {
            background: rgba(58, 175, 215, 0.25);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 40px;
            margin-top: 50px;
            margin-bottom: 50px;
        }

        .navbar {
            background: white;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #fff;
            margin-bottom: 15px;
        }

        .btn{
            background-color: #00cefb;
            color: black;
        }

        .btn:hover {
            background-color: #00a0c4;
        }

        footer {
            background: white;
            padding: 10px ;
            width: 75%;
            border-radius: 15px;
            margin: 1%; 
        }
        img{
        width: 50px;
        height: 50px;
         }
    </style>
</head>
<body>
<center>
     <nav class="navbar navbar-expand-lg navbar-light bg-white">
  <div class="container-fluid">

    <a class="navbar-brand" href="#"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQchdgIeG7ozkE0TV__FakwgnYka2ouCJgzNg&s" alt="oblogo" class="" id="logo"></a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mynavbar">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" href="index.html">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="FareGuidePage.html">Fare Guide</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="https://www.lrta.gov.ph/train-operating-schedule/">Schedule</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="https://findahelpline.com/organizations/bantay-bata-helpline-163">Help</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="Page2.html">Register</a>
        </li>
      </ul>
</div>

</div>
</nav>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10 registration-card">
                <div class="row">
                    <div class="col-md-5 text-center d-flex flex-column align-items-center justify-content-center border-end border-info border-opacity-25">
                        <img id="profilePreview" src="https://via.placeholder.com/150" alt="Profile" class="profile-img">
                        <div class="input-group mb-3">
                            <input type="file" class="form-control form-control-sm" id="fileInput">
                        </div>
                        <button class="btn w-100" onclick="upload()">Upload Photo</button>
                    </div>

    <div class="col-md-7">
        <h2 class="fw-bold mb-3">REGISTRATION</h2>
                        
            <details class="ontoggle">
                <summary class="small text-info">Instructions</summary>
                <p class="text-info" id="Instructions"></p>
            </details>
            <br>

            <form id="regForm">
                <div class="row g-3">
                     <div class="col-12">
                        <label class="form-label small mb-0">First Name</label>
                        <input type="text" class="form-control form-control-sm" id="fName">
                    </div> <br>
                <div class="col-12">
                        <label class="form-label small mb-0">Last Name</label>
                        <input type="text" class="form-control form-control-sm" id="lName">
                    </div><br>
                <div class="col-3">
                        <label class="form-label small mb-0">Age</label>
                        <input type="number" class="form-control form-control-sm" id="age">
                    </div><br>
                <div class="col-9">
                        <label class="form-label small mb-0">Contact Number</label>
                        <input type="text" class="form-control form-control-sm" id="contact">
                    </div><br>
                 <div class="col-12">
                        <label class="form-label small mb-0">Email</label>
                        <input type="email" class="form-control form-control-sm" id="email">
                    </div><br>
                <div class="col-12">
                        <label class="form-label small mb-0">Enter your username</label>
                        <input type="text" class="form-control form-control-sm" id="user">
                      </div><br>
                <div class="col-12">
                        <label class="form-label small mb-0">Enter your password</label>
                        <input type="password" class="form-control form-control-sm" id="pass">
                    </div><br>
                <div class="col-12">
                <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="terms">
                        <label class="form-check-label small" for="terms">
                            I accept the <a href="https://www.google.com" class="text-info">Terms of Use and Privacy Policy</a>
                        </label><br>
                    </div>
                </div>
             <div class="col-12 mt-4 text-center">
        <button type="button" class="btn w-100 mb-2" onclick="createacc()">Create my account</button>
    </div>
    </div>
    </form>
    </div>
    </div>
    </div>
    </div>
    </div>

    <footer class="text-black">
        Francis Fernandez, Aryana Vargas, Tyler Sales | 9 - Topaz ©2026
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/js/bootstrap.bundle.min.js"></script>

    <script>

        document.getElementById('Instructions').innerHTML= "Hover to the navbar to visit the Fare Guide. You may register an account to unlock more elements!";

        function upload() {
            const file = document.getElementById('fileInput').value;
            
            if (file !== "") {
                alert("This page says\nYour profile pic has been uploaded.");
            } else {
                alert("Please choose a file first.");
            }
        }

       function createacc() {
            let firstName = document.getElementById('fName').value;
            let age = Number(document.getElementById('age').value);
            let isChecked = document.getElementById('terms').checked;

            if (firstName === "" || age === 0) {
                alert("Please fill in the required fields.");
            } else if (!isChecked) {
                alert("You must accept the terms and conditions.");
            } else {
                alert("Account created successfully for " + firstName + "!");
        
        // Go to the confirmation page
            window.location.href = "Page3.html";
    }
}

        const defaultPFP = "https://via.placeholder.com/120";

        // Preview selected image
        document.getElementById("pfpInput").addEventListener("change", function(event) {
        const file = event.target.files[0];

        if (file) {
            const imageURL = URL.createObjectURL(file);
            document.getElementById("pfpPreview").src = imageURL;

        // Alert notification
        alert("Profile picture uploaded successfully!");
    }
});           
        
    </script>
    </center>
</body>

</html>
